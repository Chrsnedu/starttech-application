name: Frontend CI/CD

on:
  pull_request:
    paths:
      - ".github/workflows/frontend-ci-cd.yml"
      - "Client/**"
      - "frontend/**"
      - "scripts/deploy-frontend.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-ci-cd.yml"
      - "Client/**"
      - "frontend/**"
      - "scripts/deploy-frontend.sh"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ../scripts/deploy-frontend.sh
        env:
          FRONTEND_BUCKET_NAME: ${{ vars.FRONTEND_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      - name: Deployment summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FRONTEND_BUCKET_NAME: ${{ vars.FRONTEND_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          echo "Frontend deployed to S3 bucket: $FRONTEND_BUCKET_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "CloudFront invalidation requested for distribution: $CLOUDFRONT_DISTRIBUTION_ID" >> "$GITHUB_STEP_SUMMARY"
