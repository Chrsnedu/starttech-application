name: Backend CI/CD

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "Server/MuchToDo/**"
      - "backend/**"
      - "scripts/deploy-backend.sh"
      - "scripts/health-check.sh"
      - "scripts/rollback.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "Server/MuchToDo/**"
      - "backend/**"
      - "scripts/deploy-backend.sh"
      - "scripts/health-check.sh"
      - "scripts/rollback.sh"

permissions:
  id-token: write
  contents: read

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Server/MuchToDo/go.mod

      - name: Run unit tests
        run: go test ./...

      - name: Run integration tests
        run: INTEGRATION=true go test -v ./...

      - name: Run Go security scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Build Docker image
        working-directory: ${{ github.workspace }}
        run: docker build -f backend/Dockerfile -t starttech-backend:${{ github.sha }} .

      - name: Scan Docker image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL starttech-backend:${{ github.sha }}

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ github.sha }}"
          docker tag starttech-backend:${{ github.sha }} "$IMAGE_URI"
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: ./scripts/deploy-backend.sh
        env:
          BACKEND_IMAGE_URI: ${{ env.IMAGE_URI }}
          BACKEND_IMAGE_PARAMETER_NAME: ${{ vars.BACKEND_IMAGE_PARAMETER_NAME }}
          BACKEND_ASG_NAME: ${{ vars.BACKEND_ASG_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run smoke tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: ./scripts/health-check.sh
        env:
          BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}

      - name: Deployment summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BACKEND_ASG_NAME: ${{ vars.BACKEND_ASG_NAME }}
        run: |
          echo "Backend deployed with image: $IMAGE_URI" >> "$GITHUB_STEP_SUMMARY"
          echo "ASG instance refresh triggered for: $BACKEND_ASG_NAME" >> "$GITHUB_STEP_SUMMARY"
